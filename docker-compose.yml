services:
  mysql:
    image: mysql:8.4
    container_name: clearpath-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: clearpath_root
      MYSQL_DATABASE: clearpath
      MYSQL_USER: clearpath_app
      MYSQL_PASSWORD: clearpath_app
    ports:
      - "3306:3306"
    volumes:
      - clearpath_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uclearpath_app", "-pclearpath_app"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: clearpath-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - clearpath_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: clearpath-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: clearpath_root
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy

  telemetry:
    # Deliberately opt-in: `docker compose up` never starts live ingestion.
    profiles: ["telemetry"]
    build:
      context: ./Data+ML/test/6.15-6.20
      dockerfile: Dockerfile.telemetry
    restart: on-failure:5
    environment:
      CLEARPATH_DB_HOST: mysql
      CLEARPATH_DB_PORT: "3306"
      CLEARPATH_DB_USER: clearpath_app
      CLEARPATH_DB_PASSWORD: clearpath_app
      CLEARPATH_DB_NAME: clearpath
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      TELEMETRY_SOURCE_URL: ${TELEMETRY_SOURCE_URL:-}
      TELEMETRY_SOURCE_BEARER_TOKEN: ${TELEMETRY_SOURCE_BEARER_TOKEN:-}
      TELEMETRY_SOURCE_NAME: ${TELEMETRY_SOURCE_NAME:-live_capacity}
      TELEMETRY_POLL_INTERVAL_SECONDS: ${TELEMETRY_POLL_INTERVAL_SECONDS:-300}
      TELEMETRY_REQUEST_TIMEOUT_SECONDS: ${TELEMETRY_REQUEST_TIMEOUT_SECONDS:-10}
      TELEMETRY_MAX_RETRIES: ${TELEMETRY_MAX_RETRIES:-3}
      TELEMETRY_RETRY_BACKOFF_SECONDS: ${TELEMETRY_RETRY_BACKOFF_SECONDS:-5}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  clearpath_mysql_data:
  clearpath_redis_data:
  # clearpath_mysql_keyring removed — keyring_file.so not available in mysql:8.4
