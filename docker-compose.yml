services:
  mysql:
    image: mysql:8.4
    container_name: clearpath-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: clearpath_root
      MYSQL_DATABASE: clearpath
      MYSQL_USER: clearpath_app
      MYSQL_PASSWORD: clearpath_app
    command:
      - --early-plugin-load=keyring_file.so
      - --keyring_file_data=/var/lib/mysql-keyring/keyring
    ports:
      - "3306:3306"
    volumes:
      - clearpath_mysql_data:/var/lib/mysql
      - clearpath_mysql_keyring:/var/lib/mysql-keyring
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uclearpath_app", "-pclearpath_app"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: clearpath-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - clearpath_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: clearpath-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: clearpath_root
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  clearpath_mysql_data:
  clearpath_mysql_keyring:
  clearpath_redis_data:
