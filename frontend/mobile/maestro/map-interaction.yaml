appId: com.clearpath.mobile
---
- launchApp
- setLocation:
    latitude: 40.7580
    longitude: -73.9855
- openLink: "clearpathmobilepractice://login"
- tapOn:
    id: "login-email-input"
- inputText: "maestro-test-1@yourdomain.com"
- tapOn:
    id: "login-password-input"
- inputText: "TestPass123!"
- tapOn: "Sign In"
- tapOn: "Sign In"
- tapOn:
    text: "Not Now"
    optional: true
- extendedWaitUntil:
    visible:
      id: "category-chip-Clinic"
    timeout: 45000
- tapOn:
    id: "category-chip-Pharmacy"
- tapOn:
    id: "map-search-input"
- inputText: "CVS"
- tapOn:
    id: "map-filter-button"
- extendedWaitUntil:
    visible:
      id: "apply-filters-button"
    timeout: 10000
- tapOn:
    id: "wheelchair-access-section"
- tapOn:
    id: "apply-filters-button"
