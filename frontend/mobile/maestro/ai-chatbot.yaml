appId: com.clearpath.mobile
---
- launchApp
- setLocation:
    latitude: 40.7580
    longitude: -73.9855
- openLink: "clearpathmobilepractice://login"
- tapOn:
    id: "login-email-input"
- inputText: "maestro-test-1@yourdomain.com"
- tapOn:
    id: "login-password-input"
- inputText: "TestPass123!"
- tapOn: "Sign In"
- tapOn: "Sign In"
- tapOn:
    text: "Not Now"
    optional: true
- extendedWaitUntil:
    visible:
      id: "category-chip-Clinic"
    timeout: 45000
- tapOn:
    id: "tab-assistant"
- tapOn:
    id: "assistant-message-input"
- inputText: "Where is the nearest pharmacy?"
- tapOn:
    id: "send-button"
- extendedWaitUntil:
    visible:
      id: "send-button"
      enabled: true
    timeout: 30000
