openapi: 3.0.3
info:
  title: ClearPath API
  version: 1.5.2
  description: |
    Shared REST API contract for ClearPath frontend and backend teams.

    ## Changelog — v1.5.2
    - **Fix 13 (Tier 2 Encrypted Medical Profile):** Added
      `GET`/`PUT`/`DELETE /api/v1/user/medical-profile`, backed by a real
      MySQL `medical_profiles` table with an application-level (Tier 2)
      Fernet-encrypted payload column, layered on top of Tier 1 MySQL
      tablespace encryption. Identity is resolved strictly from the Bearer
      token's `sub` claim; an explicit `user_id` query parameter is rejected
      with 400 on every method to prevent one user addressing another's
      record.

    ## Changelog — v1.5.1
    - **Fix 12 (Logout / Token Revocation):** Added `POST /api/v1/auth/logout`
      (BearerAuth). Since access tokens are stateless JWTs, logout records the
      presented token's signature in a Redis blacklist until the token's own
      `exp`; `require_bearer_auth` now rejects blacklisted tokens with 401
      on every subsequent request. Redis is a best-effort secondary layer —
      if unreachable, the blacklist check fails open and the primary JWT
      signature/expiry check still applies.

    ## Changelog — v1.4.2
    - **Fix 5 (Medical ID / Emergency Contacts, Option B):** Mobile dropped the
      on-device SecureStore + QR approach (Option A) after implementation
      issues. Added `GET`/`PUT /user/medical-id` (`blood_type`, `conditions`,
      `allergies`) and `GET`/`POST /user/emergency-contacts` plus
      `PUT`/`DELETE /user/emergency-contacts/{contact_id}`. This data is now
      synced server-side between Mobile and Web, with full-table encryption
      applied at the DB layer. **This reverses the client-side-only stance
      from Fix 2/Fix 3 (D10) for this data** — pending confirmation from
      whoever owns D10 sign-off that DB-layer encryption satisfies the
      original compliance requirement. The `medical-passport` endpoint is
      unaffected and remains D10-compliant (render-token only, no server PDF
      storage).

    ## Changelog — v1.4.1
    - **Fix 1 (Auth Binding):** `GET /user/profile` and `GET /user/settings` upgraded from
      `ApiKeyAuth` to `BearerAuth` (JWT) so the backend can isolate per-user MySQL sessions.
    - **Fix 2 (Medical Data / D10 Compliance):** `GET /user/medical-passport` no longer
      returns a server-hosted `pdf_url`. The response is a lightweight audit acknowledgement
      containing a short-lived `render_token` (signed JWT, 5-min TTL). The Web frontend
      renders the A4 passport client-side after the user scans the mobile QR code; zero
      clinical data is written to cloud storage.
    - **Fix 3 (Server-Side Storage Risk):** `MedicalPassportResponse` schema updated —
      `pdf_url` field removed and replaced with `render_token` to eliminate unencrypted
      clinical PDF storage on the server.
    - **Fix 4 (Web Read-Only Gating):** All write endpoints (`POST /reports`,
      `POST /reports/{id}/confirmations`, `POST /user/favourites`) now document the
      `X-Client-Origin` header check and return `403 Forbidden` when the header value is
      `web`. Marked with the `x-web-readonly: true` extension for tooling.
    - **Fix 5 (Report Filtering Logic):** `ReportSubmission` and `Report` schemas now
      carry an `issue_type_label` field mapping each snake_case enum value to its
      mockup display label. `ReportSubmission` gains an `available_issue_types` field
      (populated by the backend) whose contents shrink/hide dynamically when `venue_id`
      is present, based on the venue's category. Standalone reports expose all 8 labels.
    - **Fix 6 (Future-Time Map Marker Colour):** `VenueBusyness` gains a boolean
      `is_future_time_query` flag. When `true` (Auto Current Time = OFF), `busyness_color`
      must be set to `#2563EB` (blue) by the backend and clients must render the map
      marker in blue, indicating live telemetry is unavailable. `VenueBusynessResponse`
      and `GET /venues/{venue_id}/busyness` document the `query_time` parameter and the
      `forecast_mode: predicted` signal that triggers this state.
    - **Fix 7 (Missing Auth Routes — F-13 Deviation):** Three auth paths added:
      `POST /api/v1/auth/register`, `POST /api/v1/auth/login`, and
      `POST /api/v1/auth/reset-password`. Corresponding request/response schemas added.
      Without these the frontend cannot obtain the JWT tokens that all BearerAuth
      endpoints require.
    - **Fix 8 (Language Param Mismatch — F-02 Deviation):** `GET /api/v1/venues`
      `languages` string param replaced with two discrete params `primary_lang` and
      `secondary_lang` matching PRD F-02's dual-dropdown architecture and the
      `/venues?primary_lang=FR&secondary_lang=ZH` endpoint spec in the tech stack.
    - **Fix 9 (Long Waiting Time — PRD 8-Grid Gap):** `long_waiting_time` added as a
      distinct enum value across `ReportSubmission`, `Report`, and `listReports` filter.
      PRD US-04 AC2 and F-04 explicitly list both "Too Crowded" and "Long Waiting Time"
      as separate grid slots; the original contract only had `large_crowd` → "Too Crowded"
      with no entry for "Long Waiting Time".
    - **Fix 7 (Missing Auth Routes — F-13):** Added `/api/v1/auth/register`,
      `/api/v1/auth/login`, and `/api/v1/auth/reset-password` paths. These are required
      by F-13 (Flask-JWT-Extended) for the frontend to request initial JWT tokens.
      Also added `AuthRegisterRequest`, `AuthLoginRequest`, `AuthLoginResponse`,
      `AuthResetPasswordRequest`, and `AuthResetPasswordResponse` schemas. Guest-mode
      access is preserved: no auth required for map browsing, venue reading, report
      viewing, or chatbot use per F-13 spec.
    - **Fix 8 (Language Filter Mismatch — F-02):** `GET /api/v1/venues` `languages`
      single-string parameter replaced with two separate fields: `primary_lang` and
      `secondary_lang` (optional), matching the dual-dropdown UI state in F-02 and the
      PRD tech stack note `/venues?primary_lang=FR&secondary_lang=ZH`.
    - **Fix 9 (Missing issue_type `long_waiting_time` — F-04/US-04):** The PRD
      explicitly names `Long Waiting Time` as one of the 8 standardized grid labels.
      Added `long_waiting_time` to all `issue_type` enums and mapped it to the
      `Long Waiting Time` display label. Previous contract erroneously omitted it.
    - **Fix 10 (F-14 PDF is Web-client-side only):** Confirmed `GET /user/medical-passport`
      render_token approach (v1.4.1) aligns with F-14: PDF is generated via
      browser `window.print()` on the web client, not server-side. No further schema
      changes needed beyond what was applied in v1.4.1.
    - **Fix 11 (F-13 / B2.4 Account Personalization — PUT endpoints added):**
      Added `PUT /api/v1/user/profile` and `PUT /api/v1/user/settings` so users
      can edit their profile and settings per F-13. `UserProfileUpdate` exposes
      only the 3 fields editable on the profile page (`phone`, `nationality`,
      `spoken_languages`); `user_id`, `email`, and `full_name` remain
      registration-locked (read-only). `UserSettingsUpdate` mirrors the
      user-togglable fields of `UserSettings`. Also removed the dead
      `GET /user/medical-id` and `GET /user/emergency-contacts` routes from
      `src/api/user.py` per the D10 decision (medical data stays device-local;
      these were never part of the OpenAPI contract and referenced non-existent
      mock data).

servers:
  - url: http://localhost:5000
    description: Local development server

tags:
  - name: Auth
  - name: Health
  - name: Auth
  - name: Integrations
  - name: Venues
  - name: Busyness
  - name: Reports
  - name: User
  - name: Routes
  - name: Realtime
  - name: Insights
  - name: Chatbot
  - name: App State

paths:
  # FIX 7 — Missing Auth Routes (F-13 Deviation)
  # F-13 requires Flask-JWT-Extended for all authenticated API communication.
  # Without these routes the frontend cannot request the initial JWT tokens.
  # Guest access (map browse, venue read, report view, chatbot) remains open.

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      description: >
        Creates a new user account via email, full name, and password (no
        third-party OAuth per F-13). On success, returns a JWT access token and
        triggers the "Finish Profile" intercept bottom-sheet prompt on the client.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: Account created. JWT tokens returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '400':
          description: Validation failed (missing fields, weak password, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '409':
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive JWT tokens
      description: >
        Authenticates via email and password. Returns a short-lived JWT access
        token and a refresh token. All BearerAuth-protected endpoints require
        the access token in the Authorization header.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Authentication successful. JWT tokens returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      description: >
        Sends a tokenized password-reset link to the registered email address
        per F-13 secure self-service password recovery requirement. Does not
        confirm whether the email exists (prevents enumeration).
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResetPasswordRequest'
      responses:
        '200':
          description: Reset email dispatched if the address is registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResetPasswordResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  # FIX 12 — Logout / Token Revocation
  # Bearer access tokens are stateless JWTs, so logout cannot delete them
  # server-side. Instead the presented token's signature is recorded in a
  # Redis blacklist until its own exp, after which require_bearer_auth
  # rejects it on every subsequent request.
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current access token
      description: >
        Adds the presented Bearer token's signature to the Redis revocation
        blacklist for the remainder of its lifetime. Subsequent requests with
        the same token are rejected with 401.
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token revoked.
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: Logged out.
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/integrations/status:
    get:
      tags: [Integrations]
      summary: Get integration configuration status
      operationId: getIntegrationsStatus
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Current integration configuration flags.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationsStatusResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/venues:
    get:
      tags: [Venues]
      summary: List venues
      operationId: listVenues
      security:
        - ApiKeyAuth: []
      parameters:
        # FIX 8 — F-02 Language Filter: dual-field architecture
        # PRD F-02 explicitly requires two separate fields matching the dual-dropdown
        # UI (Primary Language + Secondary Language Optional). The previous single
        # `languages` comma-string param did not match the frontend state model or
        # the PRD tech stack note (/venues?primary_lang=FR&secondary_lang=ZH).
        - name: primary_lang
          in: query
          required: false
          description: >
            Primary language filter — ISO 639-1 code (e.g. FR, ZH, ES). Filters map
            pins to venues whose verified supported languages include this value.
            Corresponds to the "Primary Language" dropdown in the Advanced Filters panel.
            Pre-populated from the user's saved profile language preference but remains
            inactive until explicitly applied.
          schema:
            type: string
            example: FR
        - name: secondary_lang
          in: query
          required: false
          description: >
            Optional secondary language filter — ISO 639-1 code (e.g. ZH, ES).
            Corresponds to the "Secondary Language (Optional)" dropdown in the Advanced
            Filters panel. When provided, venues must support BOTH primary_lang AND
            secondary_lang to appear in results.
          schema:
            type: string
            example: ZH
        - name: accessible
          in: query
          required: false
          description: When true, returns only fully accessible venues.
          schema:
            type: boolean
        - name: open_now
          in: query
          required: false
          description: When true, returns only venues that are open now.
          schema:
            type: boolean
        - name: venue_type
          in: query
          required: false
          description: Optional venue type filter for advanced filtering.
          schema:
            type: string
            enum: [restroom, healthcare, emergencyasset, clinic, pharmacy, hospital, dentist, laboratory]
      responses:
        '200':
          description: A pageless list of venues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueListResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/venues/{venue_id}:
    get:
      tags: [Venues]
      summary: Get a venue by ID
      operationId: getVenueById
      security:
        - ApiKeyAuth: []
      parameters:
        - name: venue_id
          in: path
          required: true
          description: Unique venue identifier.
          schema:
            type: string
      responses:
        '200':
          description: Venue found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Venue'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Venue not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/venues/{venue_id}/busyness:
    get:
      tags: [Busyness]
      summary: Get realtime busyness for a venue
      description: >
        Returns the current busyness snapshot for a venue. When `query_time` is supplied
        (Auto Current Time = OFF), live telemetry is unavailable; the backend sets
        `is_future_time_query: true` and `busyness_color: "#2563EB"` in the response, and
        clients must render the map marker in blue to signal predicted-only data.
      operationId: getVenueBusyness
      security:
        - ApiKeyAuth: []
      parameters:
        - name: venue_id
          in: path
          required: true
          schema:
            type: string
        - name: query_time
          in: query
          required: false
          description: >
            ISO 8601 datetime for a non-current time query (Auto Current Time = OFF).
            When present, the response reflects predicted busyness only; live telemetry
            is unavailable and the map marker colour switches to blue (#2563EB).
          schema:
            type: string
            format: date-time
            example: "2025-06-12T18:00:00Z"
      responses:
        '200':
          description: Current busyness snapshot for the venue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueBusynessResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Venue not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/venues/{venue_id}/busyness/forecast:
    get:
      tags: [Busyness]
      summary: Get 12-hour busyness forecast for a venue
      operationId: getVenueBusynessForecast
      security:
        - ApiKeyAuth: []
      parameters:
        - name: venue_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Twelve-hour forecast data and best time recommendation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueBusynessForecastResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Venue not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports:
    get:
      tags: [Reports]
      summary: List active community reports
      operationId: listReports
      parameters:
        - name: venue_id
          in: query
          required: false
          schema:
            type: string
        - name: issue_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - elevator_broken
              - wheelchair_lift_broken
              - toilet_out_of_order
              - large_crowd
              - long_waiting_time
              - protest_or_blockage
              - entrance_closed
              - ramp_blocked
              - closed_early
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, resolved, expired]
      responses:
        '200':
          description: Active reports visible on the map.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'

    # FIX 4 — Web Read-Only Gating
    post:
      tags: [Reports]
      summary: Submit a crowd or accessibility report
      description: >
        **Mobile-only write endpoint.**
        The backend checks the `X-Client-Origin` header before processing any payload.
        Requests originating from the Web client (`X-Client-Origin: web`) are rejected
        with `403 Forbidden` to enforce the PRD Web Read-Only constraint and suppress
        malicious payloads from the web surface.
      x-web-readonly: true
      operationId: submitReport
      security:
        - BearerAuth: []
      parameters:
        - name: X-Client-Origin
          in: header
          required: false
          description: >
            Client platform identifier. The backend enforces `mobile` for all write
            operations. Any request carrying `web` (or no recognised origin on hardened
            environments) is rejected with `403 Forbidden` before the payload is parsed.
          schema:
            type: string
            enum: [mobile, web]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportSubmission'
      responses:
        '201':
          description: Report accepted for validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: >-
            Forbidden. Write operations are not permitted from the Web client.
            The server detected `X-Client-Origin: web` (or an equivalent web-platform
            signal) and has suppressed the payload without processing it.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports/{report_id}/confirmations:
    # FIX 4 — Web Read-Only Gating
    post:
      tags: [Reports]
      summary: Confirm or resolve an existing report
      description: >
        **Mobile-only write endpoint.**
        Returns `403 Forbidden` when `X-Client-Origin: web` is detected.
      x-web-readonly: true
      operationId: confirmReport
      security:
        - BearerAuth: []
      parameters:
        - name: report_id
          in: path
          required: true
          description: Unique report identifier.
          schema:
            type: string
        - name: X-Client-Origin
          in: header
          required: false
          description: >
            Client platform identifier. Must be `mobile` for write access.
            Requests with value `web` are rejected with 403 Forbidden.
          schema:
            type: string
            enum: [mobile, web]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportConfirmationRequest'
      responses:
        '200':
          description: Confirmation or resolution recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportConfirmationResponse'
        '400':
          description: Invalid confirmation payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden. Write operations are not permitted from the Web client.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/insights:
    get:
      tags: [Insights]
      summary: Get district-level analytics for Insights Dashboard
      operationId: getInsightsDashboard
      parameters:
        - name: district
          in: query
          required: false
          description: Optional district key such as uptown, midtown_east, midtown_west, downtown.
          schema:
            type: string
        - name: timeframe
          in: query
          required: false
          schema:
            type: string
            enum: [live, today, week]
      responses:
        '200':
          description: Analytics payload for Insights Dashboard cards and charts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightsDashboard'

  /api/v1/chatbot:
    post:
      tags: [Chatbot]
      summary: Ask the multilingual assistant a question
      operationId: askChatbot
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatbotRequest'
      responses:
        '200':
          description: Assistant response generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatbotResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # FIX 6 — Token Issuance: BearerAuth-gated endpoints (Fix 1) had no way to
  # actually obtain a token. This issues the signed JWT that clients pass as
  # `Authorization: Bearer <access_token>` to every BearerAuth endpoint below.
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Exchange email/password for a bearer access token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated. Use access_token as a Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Invalid email or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # FIX 1 — Auth Binding: upgraded from ApiKeyAuth to BearerAuth (JWT)
  # Without a Bearer token the backend cannot resolve the authenticated user's
  # MySQL row; ApiKeyAuth is app-level and does not carry a user identity claim.
  /api/v1/user/profile:
    get:
      tags: [User]
      summary: Get the current user profile
      operationId: getUserProfile
      security:
        - BearerAuth: []   # FIX 1: was ApiKeyAuth — JWT required for per-user session isolation
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Invalid or missing bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    # FIX 11 — F-13 / B2.4 Account Personalization
    put:
      tags: [User]
      summary: Update editable profile fields
      description: >
        Updates the user's editable profile fields. `user_id`, `email`, and
        `full_name` are registration-locked (read-only) and cannot be changed
        via this endpoint.
      operationId: updateUserProfile
      security:
