    # exchanges after QR scan to authorise purely client-side PDF rendering.
    MedicalPassportResponse:
      type: object
      required: [status]
      description: >
        Medical passport generation acknowledgement. No clinical PDF is stored
        server-side (D10 mandate). The Web frontend renders the passport
        client-side from locally-held data after scanning the mobile QR code.
        This response acts as a lightweight audit log entry only.
      properties:
        status:
          type: string
          example: generated
        render_token:
          type: string
          description: >
            Short-lived signed JWT (5-minute TTL) the Web frontend exchanges
            via QR scan to authorise client-side PDF rendering. Contains no
            clinical payload — only a user reference and expiry claim.
        language:
          type: string
        generated_at:
          type: string
          format: date-time

