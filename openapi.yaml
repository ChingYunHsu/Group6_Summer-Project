  /api/v1/realtime/map-updates:
    get:
      tags: [Realtime]
      summary: Subscribe to live map updates
      operationId: subscribeMapUpdates
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Server-Sent Events stream for venue and report map updates.
          content:
            text/event-stream:
              schema:
                type: string
                example: "event: venue_update\ndata: {\"venue_id\":\"v_1002\",\"busyness_percent\":61}\n\n"
        '401':
