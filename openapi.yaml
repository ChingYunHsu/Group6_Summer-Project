            type: string
      responses:
        '204':
          description: Emergency contact removed.
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Emergency contact not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/routes/options:
    get:
      tags: [Routes]
      summary: Get route options for the current destination
      operationId: getRouteOptions
      security:
        - ApiKeyAuth: []
      parameters:
        - name: accessibility_mode
          in: query
