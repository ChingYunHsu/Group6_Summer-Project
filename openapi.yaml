                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/routes/detail:
    get:
      tags: [Routes]
      summary: Get route detail preview
      operationId: getRouteDetail
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Route detail preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteDetailResponse'
        '401':
          description: Invalid or missing API key.
