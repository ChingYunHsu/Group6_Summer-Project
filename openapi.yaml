components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthRegisterRequest:
      type: object
      additionalProperties: false
      required: [full_name, email, password]
      description: Registration payload. No third-party OAuth per F-13.
      properties:
        full_name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    AuthLoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthLoginResponse:
      type: object
      required: [access_token, token_type, user_id]
      description: >
        JWT token pair returned on successful login or registration.
        The access_token is a short-lived JWT used in the Authorization header
        for all BearerAuth endpoints. The refresh_token allows silent re-auth.
      properties:
        access_token:
          type: string
          description: Short-lived JWT (Bearer token) for API authentication.
        refresh_token:
          type: string
          description: Long-lived token for silent access token renewal.
        token_type:
          type: string
          example: bearer
        user_id:
          type: string
        finish_profile_prompt:
          type: boolean
          description: >
            When true (new registrations), the client must display the
            "Would you like to finish setting up your Medical Profile and ID
            now?" intercept sheet per F-13 acceptance criteria.

    AuthResetPasswordRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email

    AuthResetPasswordResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: If this email is registered, a reset link has been sent.

    # FIX 7 — Auth schemas (F-13)
    RegisterRequest:
      type: object
      required: [full_name, email, password]
      additionalProperties: false
      properties:
        full_name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthTokenResponse:
      type: object
      required: [access_token, token_type, user_id]
      properties:
        access_token:
          type: string
          description: Signed JWT (Flask-JWT-Extended). Use as Bearer token.
        token_type:
          type: string
          example: bearer
        user_id:
          type: string
        show_profile_setup_prompt:
          type: boolean
          description: >
            True on first registration — frontend must display the Medical Profile
            setup intercept bottom sheet per F-13.

    PasswordResetRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email

    PasswordResetResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: If that email is registered, a reset link has been sent.

    HealthResponse:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required: [access_token, token_type, expires_in, user_id]
      properties:
        access_token:
          type: string
          description: "Signed JWT (HS256). Pass as `Authorization: Bearer <access_token>`."
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Token lifetime in seconds.
          example: 3600
        user_id:
          type: string

    IntegrationsStatusResponse:
      type: object
      required: [besttime, google_maps, gemini]
      properties:
        besttime:
          $ref: '#/components/schemas/IntegrationConfigStatus'
        google_maps:
          $ref: '#/components/schemas/IntegrationConfigStatus'
        gemini:
          $ref: '#/components/schemas/IntegrationConfigStatus'

    IntegrationConfigStatus:
      type: object
      required: [configured]
      properties:
        configured:
          type: boolean

    VenueListResponse:
      type: object
      required: [count, items]
      properties:
        count:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/Venue'

    Venue:
      type: object
      required: [venue_id, name, venue_type, latitude, longitude]
      properties:
        venue_id:
          type: string
        name:
          type: string
        venue_type:
          type: string
          enum: [restroom, healthcare, emergencyasset, clinic, pharmacy, hospital, dentist, laboratory]
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        borough:
          type: string
        address:
          type: string
        phone:
          type: string
        opening_hours:
          type: string
        opening_hours_structured:
          $ref: '#/components/schemas/OpeningHoursStructured'
        photos:
          type: array
          items:
            type: string
        rating:
          type: number
          format: float
        weather_risk:
          type: string
          enum: [low, medium, high]
        language_tags:
          type: array
          items:
            type: string
        primary_language:
          type: string
        secondary_language:
          type: string
        language:
          $ref: '#/components/schemas/VenueLanguage'
        accessibility:
          $ref: '#/components/schemas/VenueAccessibility'
        warnings:
          $ref: '#/components/schemas/VenueWarnings'
        accessible_status:
          type: string
          enum: [full_access, partial, step_free_route_only, none]
        accessibility_features:
          type: array
          items:
            type: string
        active_warning:
          type: boolean
        live_report_count:
          type: integer
          minimum: 0
        distance_km:
          type: number
          format: float
        open_now:
          type: boolean
        busyness:
          $ref: '#/components/schemas/VenueBusyness'
        busyness_level:
          type: string
          enum: [quiet, moderate, busy]
        busyness_percent:
          type: integer
          minimum: 0
          maximum: 100
        avg_wait_minutes:
          type: integer
          minimum: 0
        supported_services:
          type: array
          items:
            type: string
        live_status_badge:
          type: string
        busyness_forecast_12h:
          type: array
          items:
            $ref: '#/components/schemas/BusynessForecastPoint'
