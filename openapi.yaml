          description: >
            FIX 5 — Mockup display label corresponding to `issue_type`.
            Standalone label mapping (all 8 categories):
              elevator_broken         → "Lift Broken"
              wheelchair_lift_broken  → "Wheelchair Lift Broken"
              toilet_out_of_order     → "Toilet out of service"
              large_crowd             → "Too Crowded"
              long_waiting_time       → "Long Waiting Time"
              protest_or_blockage     → "Protest / Blockage"
              entrance_closed         → "Entrance Blocked"
              ramp_blocked            → "Ramp Blocked"
              closed_early            → "Closed Early"
            For venue-bound reports the backend only returns labels relevant to
            that venue's category; others are hidden (not disabled).
          enum:
            - "Lift Broken"
            - "Wheelchair Lift Broken"
            - "Toilet out of service"
            - "Too Crowded"
            - "Long Waiting Time"
            - "Protest / Blockage"
            - "Entrance Blocked"
            - "Ramp Blocked"
            - "Closed Early"
        venue_id:
