    # FIX 4 — Web Read-Only Gating
    post:
      tags: [User]
      summary: Add a venue to favourites
      description: >
        **Mobile-only write endpoint.**
        Returns `403 Forbidden` when `X-Client-Origin: web` is detected.
      x-web-readonly: true
      operationId: addFavourite
      security:
        - BearerAuth: []
      parameters:
        - name: X-Client-Origin
          in: header
          required: false
          description: >
            Client platform identifier. Must be `mobile` for write access.
            Requests with value `web` are rejected with 403 Forbidden.
          schema:
            type: string
            enum: [mobile, web]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavouriteCreateRequest'
      responses:
        '201':
          description: Favourite created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favourite'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden. Write operations are not permitted from the Web client.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/favourites/{venue_id}:
    delete:
      tags: [User]
