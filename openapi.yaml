        # fallbacks, so clients must treat these as optional.
        forecast_for:
          type: string
          format: date-time
        estimated_wait_minutes:
          type: integer
          nullable: true

    ReportSubmission:
      type: object
      # FIX 5 — Report Filtering Logic
      # issue_type uses backend snake_case identifiers. issue_type_label carries the
      # matching mockup display label. available_issue_types is populated by the backend:
      #   - No venue_id (standalone): all 8 categories exposed.
      #   - venue_id present: list filtered/hidden based on that venue's category.
      additionalProperties: false
      required: [issue_type, latitude, longitude]
      properties:
        venue_id:
          type: string
          description: >
            When present, the backend filters `available_issue_types` dynamically
            based on the venue's category (e.g. a pharmacy will not expose
            `elevator_broken`). Omit for standalone, non-venue-bound reports.
        issue_type:
          type: string
          description: >
            Backend identifier for the report category. See `issue_type_label` for
            the corresponding mockup display label.
          enum:
            - elevator_broken
            - wheelchair_lift_broken
            - toilet_out_of_order
            - large_crowd
            - long_waiting_time
            - protest_or_blockage
            - entrance_closed
            - ramp_blocked
            - closed_early
        available_issue_types:
          type: array
          readOnly: true
          description: >
            Backend-populated list of issue types valid for this submission context.
            Standalone reports (no venue_id) return all 8 entries. Venue-bound reports
            return only the subset relevant to that venue's category — irrelevant types
            are hidden rather than disabled. Clients must render only these options.
          items:
            type: object
            required: [value, label]
            properties:
              value:
                type: string
                description: Snake_case identifier sent in the `issue_type` field.
                enum:
                  - elevator_broken
                  - wheelchair_lift_broken
                  - toilet_out_of_order
                  - large_crowd
                  - long_waiting_time
                  - protest_or_blockage
                  - entrance_closed
                  - ramp_blocked
                  - closed_early
              label:
                type: string
                description: Mockup display label shown to the user.
                enum:
                  - "Lift Broken"
                  - "Wheelchair Lift Broken"
                  - "Toilet out of service"
                  - "Too Crowded"
                  - "Long Waiting Time"
                  - "Protest / Blockage"
                  - "Entrance Blocked"
                  - "Ramp Blocked"
                  - "Closed Early"
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        accuracy_m:
          type: number
          format: float
        anonymous:
          type: boolean
          description: Optional display anonymization flag after authenticated submission.
        description:
          type: string
        photos:
          type: array
          items:
            type: string
        default_language:
          type: string
        fallback_language:
          type: string

    ReportConfirmationRequest:
      type: object
      additionalProperties: false
      required: [action, user_id]
      properties:
        action:
          type: string
          enum:
            - still_here
            - resolved
            - not_sure
            - still_out_of_order
            - open_now
        user_id:
