openapi: 3.0.3
info:
  title: ClearPath API
  version: 1.2.0
  description: Shared REST API contract for ClearPath frontend and backend teams.

servers:
  - url: http://localhost:5000
    description: Local development server

tags:
  - name: Health
  - name: Integrations
  - name: Venues
  - name: Reports
  - name: User
  - name: Routes
  - name: App State

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/integrations/status:
    get:
      tags: [Integrations]
      summary: Get integration configuration status
      operationId: getIntegrationsStatus
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Current integration configuration flags.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationsStatusResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/venues:
    get:
      tags: [Venues]
      summary: List venues
      operationId: listVenues
      security:
        - ApiKeyAuth: []
      parameters:
        - name: languages
          in: query
          required: false
          description: Optional comma-separated language codes used to filter results.
          schema:
            type: string
            example: FR,ES
        - name: accessible
          in: query
          required: false
          description: When true, returns only fully accessible venues.
          schema:
            type: boolean
        - name: open_now
          in: query
          required: false
          description: When true, returns only venues that are open now.
          schema:
            type: boolean
        - name: venue_type
          in: query
          required: false
          description: Optional venue type filter for advanced filtering.
          schema:
            type: string
            enum: [clinic, pharmacy, hospital, dentist, laboratory]
      responses:
        '200':
          description: A pageless list of venues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueListResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/venues/{venue_id}:
    get:
      tags: [Venues]
      summary: Get a venue by ID
      operationId: getVenueById
      security:
        - ApiKeyAuth: []
      parameters:
        - name: venue_id
          in: path
          required: true
          description: Unique venue identifier.
          schema:
            type: string
      responses:
        '200':
          description: Venue found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Venue'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Venue not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports:
    get:
      tags: [Reports]
      summary: List active community reports
      operationId: listReports
      responses:
        '200':
          description: Active reports visible on the map.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'
    post:
      tags: [Reports]
      summary: Submit a crowd or accessibility report
      operationId: submitReport
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportSubmission'
      responses:
        '201':
          description: Report accepted for validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports/{report_id}/confirmations:
    post:
      tags: [Reports]
      summary: Confirm or resolve an existing report
      operationId: confirmReport
      security:
        - BearerAuth: []
      parameters:
        - name: report_id
          in: path
          required: true
          description: Unique report identifier.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportConfirmationRequest'
      responses:
        '200':
          description: Confirmation or resolution recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportConfirmationResponse'
        '400':
          description: Invalid confirmation payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/insights:
    get:
      tags: [Reports]
      summary: Get district-level analytics for Insights Dashboard
      operationId: getInsightsDashboard
      parameters:
        - name: district
          in: query
          required: false
          description: Optional district key such as uptown, midtown_east, midtown_west, downtown.
          schema:
            type: string
      responses:
        '200':
          description: Analytics payload for Insights Dashboard cards and charts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightsDashboard'

  /api/v1/user/profile:
    get:
      tags: [User]
      summary: Get the current user profile
      operationId: getUserProfile
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/settings:
    get:
      tags: [User]
      summary: Get user settings
      operationId: getUserSettings
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: User settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/languages:
    get:
      tags: [User]
      summary: List language options
      operationId: listLanguageOptions
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Supported language options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageOptionListResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/favourites:
    get:
      tags: [User]
      summary: List saved favourites
      operationId: listFavourites
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Saved venues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavouriteListResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/routes/options:
    get:
      tags: [Routes]
      summary: Get route options for the current destination
      operationId: getRouteOptions
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Available route options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteOptionsResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/routes/detail:
    get:
      tags: [Routes]
      summary: Get route detail preview
      operationId: getRouteDetail
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Route detail preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteDetailResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/app-state:
    get:
      tags: [App State]
      summary: Get application state flags
      operationId: getAppState
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Application state flags.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppState'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string

    IntegrationsStatusResponse:
      type: object
      required: [besttime, google_maps, gemini]
      properties:
        besttime:
          $ref: '#/components/schemas/IntegrationConfigStatus'
        google_maps:
          $ref: '#/components/schemas/IntegrationConfigStatus'
        gemini:
          $ref: '#/components/schemas/IntegrationConfigStatus'

    IntegrationConfigStatus:
      type: object
      required: [configured]
      properties:
        configured:
          type: boolean

    VenueListResponse:
      type: object
      required: [count, items]
      properties:
        count:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/Venue'

    Venue:
      type: object
      required: [venue_id, name]
      properties:
        venue_id:
          type: string
        name:
          type: string
        venue_type:
          type: string
          enum: [clinic, pharmacy, hospital, dentist, laboratory]
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        borough:
          type: string
        language_tags:
          type: array
          items:
            type: string
        primary_language:
          type: string
        secondary_language:
          type: string
        accessible_status:
          type: string
          enum: [full_access, partial, step_free_route_only]
        accessibility_features:
          type: array
          items:
            type: string
        active_warning:
          type: boolean
        live_report_count:
          type: integer
          minimum: 0
        busyness_level:
          type: string
          enum: [quiet, moderate, busy]
        busyness_percent:
          type: integer
          minimum: 0
          maximum: 100
        avg_wait_minutes:
          type: integer
          minimum: 0
        open_now:
          type: boolean
        address:
          type: string
        phone:
          type: string
        opening_hours:
          type: string
        distance_km:
          type: number
          format: float
        supported_services:
          type: array
          items:
            type: string
        live_status_badge:
          type: string
        busyness_forecast_12h:
          type: array
          description: Twelve hourly forecast entries sourced from the busyness_forecasts table.
          items:
            $ref: '#/components/schemas/BusynessForecastPoint'
        forecast_mode:
          type: string
          enum: [live, predicted]
        is_favourite:
          type: boolean

    BusynessForecastPoint:
      type: object
      required: [offset_hours, percent, level]
      properties:
        offset_hours:
          type: integer
          minimum: 0
          maximum: 12
        percent:
          type: integer
          minimum: 0
          maximum: 100
        level:
          type: string
          enum: [quiet, moderate, busy]

    ReportSubmission:
      type: object
      additionalProperties: false
      required: [issue_type, latitude, longitude]
      properties:
        venue_id:
          type: string
        issue_type:
          type: string
          enum:
            - elevator_broken
            - wheelchair_lift_broken
            - toilet_out_of_order
            - large_crowd
            - protest_or_blockage
            - entrance_closed
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        accuracy_meters:
          type: number
          format: float

    ReportConfirmationRequest:
      type: object
      additionalProperties: false
      required: [action]
      properties:
        action:
          type: string
          enum:
            - still_here
            - resolved
            - not_sure
            - still_out_of_order
            - open_now

    ReportListResponse:
      type: object
      required: [count, items]
      properties:
        count:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/Report'

    Report:
      type: object
      required: [report_id, venue_id, issue_type, status]
      properties:
        report_id:
          type: string
        venue_id:
          type: string
        issue_type:
          type: string
          enum:
            - elevator_broken
            - wheelchair_lift_broken
            - toilet_out_of_order
            - large_crowd
            - protest_or_blockage
            - entrance_closed
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        status:
          type: string
          enum: [active, resolved]
        confirmation_count:
          type: integer
          minimum: 0
        expires_in_minutes:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time
        badge_text:
          type: string

    ReportResponse:
      type: object
      required: [status, report_id, message]
      properties:
        status:
          type: string
          example: active
        report_id:
          type: string
        message:
          type: string
        received_payload:
          $ref: '#/components/schemas/ReportSubmission'
        visible_in_seconds:
          type: integer
        expires_in_minutes:
          type: integer

    ReportConfirmationResponse:
      type: object
      required: [report_id, action, status, report]
      properties:
        report_id:
          type: string
        action:
          type: string
        status:
          type: string
        report:
          $ref: '#/components/schemas/Report'

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ValidationErrorResponse:
      type: object
      required: [error, missing_fields]
      properties:
        error:
          type: string
        missing_fields:
          type: array
          items:
            type: string
        invalid_fields:
          type: array
          items:
            type: string
        allowed_issue_types:
          type: array
          items:
            type: string
        allowed_actions:
          type: array
          items:
            type: string

    InsightsDashboard:
      type: object
      required:
        [district, real_time_density, quick_triage, best_travel_window, prediction_series, fastest_hubs]
      properties:
        district:
          type: string
        real_time_density:
          type: object
          required: [percent, trend]
          properties:
            percent:
              type: integer
              minimum: 0
              maximum: 100
            trend:
              type: string
            trend_label:
              type: string
        quick_triage:
          type: object
          required: [wait_minutes, label]
          properties:
            wait_minutes:
              type: integer
              minimum: 0
            label:
              type: string
            venue_name:
              type: string
        best_travel_window:
          type: object
          required: [start_time, end_time]
          properties:
            start_time:
              type: string
              example: '14:30'
            end_time:
              type: string
              example: '16:00'
            start:
              type: string
            end:
              type: string
            cta_label:
              type: string
        chart_mode:
          type: string
        prediction_series:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 100
        history_series_7d:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 100
        fastest_hubs:
          type: array
          items:
            type: object
            required: [venue_id, clinic_name, capacity_label, travel_minutes]
            properties:
              venue_id:
                type: string
              clinic_name:
                type: string
              venue_name:
                type: string
              capacity_label:
                type: string
              flow_status:
                type: string
              travel_minutes:
                type: integer
                minimum: 0
              wait_minutes:
                type: integer
                minimum: 0
              languages:
                type: array
                items:
                  type: string
              language_flags:
                type: array
                items:
                  type: string

    UserProfile:
      type: object
      required: [user_id, account_state, full_name]
      properties:
        user_id:
          type: string
        account_state:
          type: string
        full_name:
          type: string
        email:
          type: string
        phone:
          type: string
        date_of_birth:
          type: string
        gender:
          type: string
        nationality:
          type: string
        address:
          type: string
        spoken_languages:
          type: array
          items:
            type: string
        guest_prompt_title:
          type: string
        avatar_initials:
          type: string

    UserSettings:
      type: object
      properties:
        selected_language:
          type: string
        selected_language_native:
          type: string
        location_access_enabled:
          type: boolean
        notifications_enabled:
          type: boolean
        privacy_mode:
          type: string
        guest_mode_enabled:
          type: boolean
        show_medical_id_on_sos:
          type: boolean
        data_export_available:
          type: boolean
        delete_account_enabled:
          type: boolean

    LanguageOptionListResponse:
      type: object
      required: [count, items]
      properties:
        count:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/LanguageOption'

    LanguageOption:
      type: object
      required: [code, native_name, english_name]
      properties:
        code:
          type: string
        native_name:
          type: string
        english_name:
          type: string

    FavouriteListResponse:
      type: object
      required: [count, items]
      properties:
        count:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/Favourite'

    Favourite:
      type: object
      required: [favourite_id, venue_id]
      properties:
        favourite_id:
          type: string
        venue_id:
          type: string
        saved_at:
          type: string
          format: date-time
        display_status:
          type: string

    RouteOptionsResponse:
      type: object
      properties:
        origin_label:
          type: string
        destination_venue_id:
          type: string
        departure_time_label:
          type: string
        options:
          type: array
          items:
            $ref: '#/components/schemas/RouteOption'

    RouteOption:
      type: object
      required: [mode, duration_minutes]
      properties:
        mode:
          type: string
        duration_minutes:
          type: integer
          minimum: 0
        accessibility_mode:
          type: string
          enum: [standard, step_free]
        status:
          type: string
        summary:
          type: string

    RouteDetailResponse:
      type: object
      properties:
        destination_venue_id:
          type: string
        polyline_preview:
          type: array
          items:
            $ref: '#/components/schemas/Coordinate'
        steps:
          type: array
          items:
            type: string
        start_navigation_label:
          type: string

    Coordinate:
      type: object
      properties:
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float

    AppState:
      type: object
      properties:
        is_guest:
          type: boolean
        is_authenticated:
          type: boolean
        has_accepted_terms:
          type: boolean
        has_accepted_privacy_policy:
          type: boolean
        location_permission:
          type: string
        show_finish_profile_prompt:
          type: boolean