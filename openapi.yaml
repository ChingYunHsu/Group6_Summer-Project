openapi: 3.0.3
info:
  title: ClearPath API
  version: 1.4.1
  description: |
    Shared REST API contract for ClearPath frontend and backend teams.

    ## Changelog — v1.4.1
    - **Fix 1 (Auth Binding):** `GET /user/profile` and `GET /user/settings` upgraded from
      `ApiKeyAuth` to `BearerAuth` (JWT) so the backend can isolate per-user MySQL sessions.
    - **Fix 2 (Medical Data / D10 Compliance):** `GET /user/medical-passport` no longer
      returns a server-hosted `pdf_url`. The response is a lightweight audit acknowledgement
      containing a short-lived `render_token` (signed JWT, 5-min TTL). The Web frontend
      renders the A4 passport client-side after the user scans the mobile QR code; zero
      clinical data is written to cloud storage.
    - **Fix 3 (Server-Side Storage Risk):** `MedicalPassportResponse` schema updated —
      `pdf_url` field removed and replaced with `render_token` to eliminate unencrypted
      clinical PDF storage on the server.
    - **Fix 4 (Web Read-Only Gating):** All write endpoints (`POST /reports`,
      `POST /reports/{id}/confirmations`, `POST /user/favourites`) now document the
      `X-Client-Origin` header check and return `403 Forbidden` when the header value is
      `web`. Marked with the `x-web-readonly: true` extension for tooling.

servers:
  - url: http://localhost:5000
    description: Local development server

tags:
  - name: Health
  - name: Integrations
  - name: Venues
  - name: Busyness
  - name: Reports
  - name: User
  - name: Routes
  - name: Realtime
  - name: Insights
  - name: Chatbot
  - name: App State

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/integrations/status:
    get:
      tags: [Integrations]
      summary: Get integration configuration status
      operationId: getIntegrationsStatus
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Current integration configuration flags.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationsStatusResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/venues:
    get:
      tags: [Venues]
      summary: List venues
      operationId: listVenues
      security:
        - ApiKeyAuth: []
      parameters:
        - name: languages
          in: query
          required: false
          description: Optional comma-separated language codes used to filter results.
          schema:
            type: string
            example: FR,ES
        - name: accessible
          in: query
          required: false
          description: When true, returns only fully accessible venues.
          schema:
            type: boolean
        - name: open_now
          in: query
          required: false
          description: When true, returns only venues that are open now.
          schema:
            type: boolean
        - name: venue_type
          in: query
          required: false
          description: Optional venue type filter for advanced filtering.
          schema:
            type: string
            enum: [restroom, healthcare, emergencyasset, clinic, pharmacy, hospital, dentist, laboratory]
      responses:
        '200':
          description: A pageless list of venues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueListResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/venues/{venue_id}:
    get:
      tags: [Venues]
      summary: Get a venue by ID
      operationId: getVenueById
      security:
        - ApiKeyAuth: []
      parameters:
        - name: venue_id
          in: path
          required: true
          description: Unique venue identifier.
          schema:
            type: string
      responses:
        '200':
          description: Venue found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Venue'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Venue not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/venues/{venue_id}/busyness:
    get:
      tags: [Busyness]
      summary: Get realtime busyness for a venue
      operationId: getVenueBusyness
      security:
        - ApiKeyAuth: []
      parameters:
        - name: venue_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current busyness snapshot for the venue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueBusynessResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Venue not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/venues/{venue_id}/busyness/forecast:
    get:
      tags: [Busyness]
      summary: Get 12-hour busyness forecast for a venue
      operationId: getVenueBusynessForecast
      security:
        - ApiKeyAuth: []
      parameters:
        - name: venue_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Twelve-hour forecast data and best time recommendation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueBusynessForecastResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Venue not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports:
    get:
      tags: [Reports]
      summary: List active community reports
      operationId: listReports
      parameters:
        - name: venue_id
          in: query
          required: false
          schema:
            type: string
        - name: issue_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - elevator_broken
              - wheelchair_lift_broken
              - toilet_out_of_order
              - large_crowd
              - protest_or_blockage
              - entrance_closed
              - ramp_blocked
              - closed_early
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, resolved, expired]
      responses:
        '200':
          description: Active reports visible on the map.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'

    # FIX 4 — Web Read-Only Gating
    post:
      tags: [Reports]
      summary: Submit a crowd or accessibility report
      description: >
        **Mobile-only write endpoint.**
        The backend checks the `X-Client-Origin` header before processing any payload.
        Requests originating from the Web client (`X-Client-Origin: web`) are rejected
        with `403 Forbidden` to enforce the PRD Web Read-Only constraint and suppress
        malicious payloads from the web surface.
      x-web-readonly: true
      operationId: submitReport
      security:
        - BearerAuth: []
      parameters:
        - name: X-Client-Origin
          in: header
          required: false
          description: >
            Client platform identifier. The backend enforces `mobile` for all write
            operations. Any request carrying `web` (or no recognised origin on hardened
            environments) is rejected with `403 Forbidden` before the payload is parsed.
          schema:
            type: string
            enum: [mobile, web]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportSubmission'
      responses:
        '201':
          description: Report accepted for validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: >-
            Forbidden. Write operations are not permitted from the Web client.
            The server detected `X-Client-Origin: web` (or an equivalent web-platform
            signal) and has suppressed the payload without processing it.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports/{report_id}/confirmations:
    # FIX 4 — Web Read-Only Gating
    post:
      tags: [Reports]
      summary: Confirm or resolve an existing report
      description: >
        **Mobile-only write endpoint.**
        Returns `403 Forbidden` when `X-Client-Origin: web` is detected.
      x-web-readonly: true
      operationId: confirmReport
      security:
        - BearerAuth: []
      parameters:
        - name: report_id
          in: path
          required: true
          description: Unique report identifier.
          schema:
            type: string
        - name: X-Client-Origin
          in: header
          required: false
          description: >
            Client platform identifier. Must be `mobile` for write access.
            Requests with value `web` are rejected with 403 Forbidden.
          schema:
            type: string
            enum: [mobile, web]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportConfirmationRequest'
      responses:
        '200':
          description: Confirmation or resolution recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportConfirmationResponse'
        '400':
          description: Invalid confirmation payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden. Write operations are not permitted from the Web client.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/insights:
    get:
      tags: [Insights]
      summary: Get district-level analytics for Insights Dashboard
      operationId: getInsightsDashboard
      parameters:
        - name: district
          in: query
          required: false
          description: Optional district key such as uptown, midtown_east, midtown_west, downtown.
          schema:
            type: string
        - name: timeframe
          in: query
          required: false
          schema:
            type: string
            enum: [live, today, week]
      responses:
        '200':
          description: Analytics payload for Insights Dashboard cards and charts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightsDashboard'

  /api/v1/chatbot:
    post:
      tags: [Chatbot]
      summary: Ask the multilingual assistant a question
      operationId: askChatbot
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatbotRequest'
      responses:
        '200':
          description: Assistant response generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatbotResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # FIX 1 — Auth Binding: upgraded from ApiKeyAuth to BearerAuth (JWT)
  # Without a Bearer token the backend cannot resolve the authenticated user's
  # MySQL row; ApiKeyAuth is app-level and does not carry a user identity claim.
  /api/v1/user/profile:
    get:
      tags: [User]
      summary: Get the current user profile
      operationId: getUserProfile
      security:
        - BearerAuth: []   # FIX 1: was ApiKeyAuth — JWT required for per-user session isolation
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Invalid or missing bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # FIX 1 — Auth Binding: upgraded from ApiKeyAuth to BearerAuth (JWT)
  /api/v1/user/settings:
    get:
      tags: [User]
      summary: Get user settings
      operationId: getUserSettings
      security:
        - BearerAuth: []   # FIX 1: was ApiKeyAuth — JWT required for per-user session isolation
      responses:
        '200':
          description: User settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        '401':
          description: Invalid or missing bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/languages:
    get:
      tags: [User]
      summary: List language options
      operationId: listLanguageOptions
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Supported language options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageOptionListResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/favourites:
    get:
      tags: [User]
      summary: List saved favourites
      operationId: listFavourites
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Saved venues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavouriteListResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    # FIX 4 — Web Read-Only Gating
    post:
      tags: [User]
      summary: Add a venue to favourites
      description: >
        **Mobile-only write endpoint.**
        Returns `403 Forbidden` when `X-Client-Origin: web` is detected.
      x-web-readonly: true
      operationId: addFavourite
      security:
        - BearerAuth: []
      parameters:
        - name: X-Client-Origin
          in: header
          required: false
          description: >
            Client platform identifier. Must be `mobile` for write access.
            Requests with value `web` are rejected with 403 Forbidden.
          schema:
            type: string
            enum: [mobile, web]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavouriteCreateRequest'
      responses:
        '201':
          description: Favourite created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favourite'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden. Write operations are not permitted from the Web client.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/favourites/{venue_id}:
    delete:
      tags: [User]
      summary: Remove a venue from favourites
      operationId: deleteFavourite
      security:
        - BearerAuth: []
      parameters:
        - name: venue_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Favourite removed.
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Favourite not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/notification-preferences:
    get:
      tags: [User]
      summary: Get busyness alert and notification preferences
      operationId: getNotificationPreferences
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Notification preferences.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [User]
      summary: Update busyness alert and notification preferences
      operationId: updateNotificationPreferences
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferencesUpdate'
      responses:
        '200':
          description: Notification preferences updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/sos:
    post:
      tags: [User]
      summary: Trigger SOS panic flow
      operationId: triggerSos
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SosRequest'
      responses:
        '200':
          description: SOS event accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SosResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/account:
    delete:
      tags: [User]
      summary: Delete user account and purge synced data
      operationId: deleteUserAccount
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account deletion accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAccountResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # FIX 2 & FIX 3 — Medical Data Starvation / Server-Side Storage Risk
  # Per D10, all sensitive medical data is strictly client-side. This endpoint
  # no longer triggers server-side PDF generation or storage. Instead it returns
  # a short-lived render_token (signed JWT, 5-min TTL) that authorises the Web
  # frontend to render the passport client-side after the user scans the mobile
  # QR code. Zero clinical rows or PDF files are written to the cloud.
  /api/v1/user/medical-passport:
    get:
      tags: [User]
      summary: Issue a render token for client-side medical passport generation
      description: >
        **D10 Compliant — No server-side PDF storage.**

        This endpoint acts as a lightweight audit log and token issuer only.
        The Web frontend renders the A4 passport PDF entirely client-side using
        data already held locally on the user's device, accessed after scanning
        the mobile QR code that encodes the `render_token` returned here.

        No clinical payload is transmitted to or stored on the server. The
        `pdf_url` field from v1.4.0 has been removed (Fix 3 — Server-Side
        Storage Risk).
      operationId: getMedicalPassport
      security:
        - BearerAuth: []
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
            example: en
      responses:
        '200':
          description: >-
            Render token issued. No clinical data is stored server-side.
            The client uses the render_token to authorise local PDF rendering
            after QR scan. Token expires in 5 minutes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalPassportResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/routes/options:
    get:
      tags: [Routes]
      summary: Get route options for the current destination
      operationId: getRouteOptions
      security:
        - ApiKeyAuth: []
      parameters:
        - name: accessibility_mode
          in: query
          required: false
          description: Optional routing accessibility preference.
          schema:
            type: string
            enum: [standard, step_free]
      responses:
        '200':
          description: Available route options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteOptionsResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/routes/detail:
    get:
      tags: [Routes]
      summary: Get route detail preview
      operationId: getRouteDetail
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Route detail preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteDetailResponse'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/realtime/map-updates:
    get:
      tags: [Realtime]
      summary: Subscribe to live map updates
      operationId: subscribeMapUpdates
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Server-Sent Events stream for venue and report map updates.
          content:
            text/event-stream:
              schema:
                type: string
                example: "event: venue_update\ndata: {\"venue_id\":\"v_1002\",\"busyness_percent\":61}\n\n"
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/app-state:
    get:
      tags: [App State]
      summary: Get application state flags
      operationId: getAppState
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Application state flags.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppState'
        '401':
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string

    IntegrationsStatusResponse:
      type: object
      required: [besttime, google_maps, gemini]
      properties:
        besttime:
          $ref: '#/components/schemas/IntegrationConfigStatus'
        google_maps:
          $ref: '#/components/schemas/IntegrationConfigStatus'
        gemini:
          $ref: '#/components/schemas/IntegrationConfigStatus'

    IntegrationConfigStatus:
      type: object
      required: [configured]
      properties:
        configured:
          type: boolean

    VenueListResponse:
      type: object
      required: [count, items]
      properties:
        count:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/Venue'

    Venue:
      type: object
      required: [venue_id, name, venue_type, latitude, longitude]
      properties:
        venue_id:
          type: string
        name:
          type: string
        venue_type:
          type: string
          enum: [restroom, healthcare, emergencyasset, clinic, pharmacy, hospital, dentist, laboratory]
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        borough:
          type: string
        address:
          type: string
        phone:
          type: string
        opening_hours:
          type: string
        opening_hours_structured:
          $ref: '#/components/schemas/OpeningHoursStructured'
        photos:
          type: array
          items:
            type: string
        rating:
          type: number
          format: float
        weather_risk:
          type: string
          enum: [low, medium, high]
        language_tags:
          type: array
          items:
            type: string
        primary_language:
          type: string
        secondary_language:
          type: string
        language:
          $ref: '#/components/schemas/VenueLanguage'
        accessibility:
          $ref: '#/components/schemas/VenueAccessibility'
        warnings:
          $ref: '#/components/schemas/VenueWarnings'
        accessible_status:
          type: string
          enum: [full_access, partial, step_free_route_only, none]
        accessibility_features:
          type: array
          items:
            type: string
        active_warning:
          type: boolean
        live_report_count:
          type: integer
          minimum: 0
        distance_km:
          type: number
          format: float
        open_now:
          type: boolean
        busyness:
