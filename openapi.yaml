          type: string
          enum: [full, partial, none]
        chatbot_enabled:
          type: boolean
        chatbot_welcoming_message:
          type: string

    VenueBusyness:
      type: object
      # FIX 6 — Future-Time Map Marker Colour
      # When is_future_time_query is true (Auto Current Time = OFF), live telemetry is
      # unavailable. The backend MUST set busyness_color to "#2563EB" (blue) and clients
      # MUST render the map marker blue to indicate predicted-only data.
      properties:
        busyness_score:
          type: integer
          minimum: 0
          maximum: 100
        busyness_status:
          type: string
          enum: [quiet, moderate, busy]
        busyness_color:
          type: string
          description: >
            Hex colour for the map marker. Normally reflects live busyness level
            (green/amber/red). When `is_future_time_query` is `true`, this MUST be
            `#2563EB` (blue) to indicate live telemetry is unavailable.
          example: "#2563EB"
        is_future_time_query:
          type: boolean
          description: >
            True when the busyness data is for a non-current (future or past) time
            (i.e. Auto Current Time = OFF). Clients must switch all map markers to
            blue (#2563EB) uniformly when this flag is true, as live busyness
            telemetry is unavailable for the queried time.
          default: false
        data_mode:
          type: string
          enum: [live, predicted]
          description: >
            Indicates whether busyness data is sourced from live telemetry (`live`)
            or from forecast/historical prediction (`predicted`). Always `predicted`
            when `is_future_time_query` is `true`.
        estimated_wait_minutes:
          type: integer
          minimum: 0
        updated_at:
          type: string
          format: date-time

    VenueBusynessResponse:
      type: object
      required: [venue_id, busyness]
      properties:
        venue_id:
          type: string
        busyness:
          $ref: '#/components/schemas/VenueBusyness'

    VenueBusynessForecastResponse:
      type: object
      required: [venue_id, forecast, best_time_to_go_today]
      properties:
        venue_id:
          type: string
        forecast:
          type: array
          items:
            $ref: '#/components/schemas/BusynessForecastPoint'
        best_time_to_go_today:
          type: object
          properties:
            offset_hours:
              type: integer
            percent:
              type: integer
            label:
              type: string
        # SOP 3 — data lineage. data_mode: forecast (busyness_forecasts table),
        # predicted (legacy busyness_scores.forecast_1h JSON), mock (mock_data).
        # forecast_source names the concrete source for observability.
        data_mode:
          type: string
          enum: [forecast, predicted, mock]
        forecast_source:
          type: string
        # SOP 4 — v2 model metadata. Present when data_mode=forecast (busyness_forecasts
        # path). model_version tags the ML run (e.g. forecast-v2). feature_snapshot_at
        # is the generated_at timestamp of the forecast rows. external_feature_status
        # surfaces which external sources (weather/holiday/GBFS/MTA) were available.
        model_version:
          type: string
          example: forecast-v2
        feature_snapshot_at:
          type: string
          format: date-time
          nullable: true
        external_feature_status:
          type: object
          properties:
            status:
              type: string
              enum: [ok, no_active_cache, unavailable]
            checked_at:
              type: string
              format: date-time
            sources:
              type: object
              additionalProperties: true

    OpeningHoursStructured:
      type: object
      properties:
        monday:
          $ref: '#/components/schemas/DailyOpeningHours'
        tuesday:
          $ref: '#/components/schemas/DailyOpeningHours'
