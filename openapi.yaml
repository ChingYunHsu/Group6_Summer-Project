              schema:
                $ref: '#/components/schemas/DeleteAccountResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # FIX 2 & FIX 3 — Medical Data Starvation / Server-Side Storage Risk
  # Per D10, all sensitive medical data is strictly client-side. This endpoint
  # no longer triggers server-side PDF generation or storage. Instead it returns
  # a short-lived render_token (signed JWT, 5-min TTL) that authorises the Web
  # frontend to render the passport client-side after the user scans the mobile
  # QR code. Zero clinical rows or PDF files are written to the cloud.
  /api/v1/user/medical-passport:
    get:
      tags: [User]
      summary: Issue a render token for client-side medical passport generation
      description: >
        **D10 Compliant — No server-side PDF storage.**

        This endpoint acts as a lightweight audit log and token issuer only.
        The Web frontend renders the A4 passport PDF entirely client-side using
        data already held locally on the user's device, accessed after scanning
        the mobile QR code that encodes the `render_token` returned here.

        No clinical payload is transmitted to or stored on the server. The
        `pdf_url` field from v1.4.0 has been removed (Fix 3 — Server-Side
        Storage Risk).
      operationId: getMedicalPassport
      security:
        - BearerAuth: []
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
            example: en
      responses:
        '200':
          description: >-
            Render token issued. No clinical data is stored server-side.
            The client uses the render_token to authorise local PDF rendering
            after QR scan. Token expires in 5 minutes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalPassportResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # FIX 5 — Medical ID / Emergency Contacts (Option B, supersedes D10 client-only mandate)
  # Mobile dropped the on-device SecureStore + QR approach (Option A) after
  # implementation issues; Medical ID and emergency contacts are now synced
  # server-side between Mobile and Web. The DB layer applies full-table
  # encryption to this data; this reverses the client-side-only stance taken
  # for Fix 2/Fix 3 on the medical-passport endpoint above, pending D10 sign-off.
  /api/v1/user/medical-id:
    get:
      tags: [User]
      summary: Get the user's Medical ID
      operationId: getMedicalId
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Medical ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalId'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [User]
      summary: Update the user's Medical ID
      operationId: updateMedicalId
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicalIdUpdate'
      responses:
        '200':
          description: Medical ID updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalId'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # FIX 13 — Tier 2 Encrypted Medical Profile (strict user isolation)
  # Real MySQL-backed, application-level (Tier 2) encrypted storage, layered
  # on top of Tier 1 MySQL tablespace encryption. Identity is resolved only
  # from the Bearer token's sub claim — an explicit user_id query parameter
  # is rejected on every method to prevent addressing another user's record.
  /api/v1/user/medical-profile:
    get:
      tags: [User]
      summary: Get the current user's Tier 2 encrypted medical profile
      description: >
        Identity is resolved from the Bearer token only. Returns 400 if a
        user_id query parameter is present.
      operationId: getMedicalProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Medical profile (decrypted server-side for the caller only).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalId'
        '400':
          description: Forbidden — explicit user_id query parameter rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [User]
      summary: Create or update the current user's medical profile
      operationId: upsertMedicalProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicalIdUpdate'
      responses:
        '200':
          description: Medical profile created or updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalId'
        '400':
          description: Validation failed, or explicit user_id query parameter rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [User]
      summary: Delete the current user's medical profile
      operationId: deleteMedicalProfile
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Medical profile deleted (or did not exist).
        '400':
          description: Forbidden — explicit user_id query parameter rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/emergency-contacts:
    get:
      tags: [User]
      summary: List emergency contacts
      operationId: listEmergencyContacts
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Emergency contacts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyContactListResponse'
        '401':
