name: ClearPath Backend CI (Poetry Engine)

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend_ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend_ci.yml'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 1

    - name: Configure Git Safe Directory
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Poetry
      run: |
        pipx install poetry


    - name: Configure Poetry to use local virtualenv
      run: |
        poetry config virtualenvs.create true
        poetry config virtualenvs.in-project true
      working-directory: ./backend

    - name: Validate Poetry files
      run: poetry check --lock
      working-directory: ./backend
 

    - name: Set up Poetry Cache
      uses: actions/cache@v4
      with:
        path: backend/.venv
        key: venv-${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock') }}-v99
        restore-keys: |
          venv-${{ runner.os }}-poetry-
    

    - name: Install dependencies
      run: |
        poetry install --no-interaction --no-root --sync
      working-directory: ./backend 

    - name: Run Backend Linting Check
      run: |
        poetry run flake8 . --count --max-complexity=10 --max-line-length=127 --statistics
      working-directory: ./backend

    - name: Run Pytest with Coverage
      run: |
        poetry run pytest tests/ -m "not integration" --cov=src --cov-fail-under=60
      working-directory: ./backend
      env:
        PYTHONPATH: .
