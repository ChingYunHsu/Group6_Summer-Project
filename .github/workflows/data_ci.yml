name: ClearPath Data & ML CI (Docker Engine)

on:
  push:
    branches: [ main ]

    paths:
      - 'Data+ML/**'
      - 'docker/mysql/**'
      - '.github/workflows/data_ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Data+ML/**'
      - 'docker/mysql/**'
      - '.github/workflows/data_ci.yml'
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests (live APIs)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-and-test-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4


    - name: Build Data Team Docker Image
      run: |
        docker build -t clearpath-data-image -f Dockerfile.telemetry .
      working-directory: ./Data+ML/test/6.15-6.20

    - name: Run Data Linting Check Inside Docker
      run: |
        docker run --rm clearpath-data-image sh -c "pip install flake8 && flake8 . --count --exit-zero --statistics"
      working-directory: './Data+ML'

    - name: Run Pytest Inside Docker Container
      run: |
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace/Data+ML \
          clearpath-data-image sh -c \
          'pip install --no-cache-dir pytest numpy pandas requests scikit-learn matplotlib pyproj && pytest test_data_skeleton.py'
      working-directory: ./Data+ML

    - name: Run Venue Coverage Offline Tests
      run: |
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace/Data+ML \
          clearpath-data-image sh -c \
          'pip install --no-cache-dir pytest numpy pandas requests scikit-learn matplotlib pyproj && pytest test/6.15-6.20/tests/test_venue_coverage.py test/6.15-6.20/tests/test_busyness_ingestion.py test/6.15-6.20/tests/test_data_contract_migrations.py -v --tb=short -m "not integration"'
      working-directory: ./Data+ML

    - name: Run ML Pure-Function Tests (SOP 8)
      run: |
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace/Data+ML \
          clearpath-data-image sh -c \
          'pip install --no-cache-dir pytest numpy pandas requests scikit-learn matplotlib pyproj && pytest test/6.28-7.3/tests/test_ml_modeling.py test/6.28-7.3/tests/test_group_split.py test/6.28-7.3/tests/test_write_forecasts_to_db.py -v --tb=short -m "not integration"'
      working-directory: ./Data+ML

    - name: Run Forecast V2 Offline Tests
      run: |
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace/Data+ML \
          clearpath-data-image sh -c \
          'pip install --no-cache-dir pytest numpy pandas requests scikit-learn matplotlib pyproj && pytest test/7.13-7.18/tests/test_forecast_v2_pattern.py test/7.13-7.18/test_external_feature_ingest.py -v --tb=short -m "not integration"'
      working-directory: ./Data+ML

  integration-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true'
    needs: build-and-test-data

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Data Team Docker Image
      run: |
        docker build -t clearpath-data-image -f Dockerfile.telemetry .
      working-directory: ./Data+ML/test/6.15-6.20

    - name: Run Integration Tests (Live APIs)
      run: |
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace/Data+ML \
          clearpath-data-image sh -c \
          'pip install --no-cache-dir pytest numpy pandas requests scikit-learn matplotlib pyproj && pytest test/6.15-6.20/tests/test_venue_coverage.py -m integration -v --tb=short'
      working-directory: ./Data+ML

    - name: Run Forecast V2 Real-Data Validation
      run: |
        docker run --rm clearpath-data-image python \
          test/7.13-7.18/validate_v2_real_data.py --evidence-root test/7.13-7.18/evidence
      working-directory: ./Data+ML
