name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: clearpath-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1
          role-session-name: ClearPathGitHubDeploy

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Send deployment command
        id: deploy
        shell: bash
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ClearPath commit ${{ github.sha }}" \
            --parameters 'commands=["sudo /usr/local/bin/clearpath-deploy"]' \
            --timeout-seconds 1200 \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait for deployment
        shell: bash
        run: |
          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"
          INSTANCE_ID="${{ vars.EC2_INSTANCE_ID }}"

          for attempt in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Attempt $attempt/120: $STATUS"

            case "$STATUS" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID"
                exit 1
                ;;
            esac

            sleep 5
          done

          FINAL_STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$FINAL_STATUS" != "Success" ]; then
            echo "Deployment did not complete successfully: $FINAL_STATUS"
            exit 1
          fi

      - name: Print deployment output
        if: always()
        shell: bash
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --query '{
              Status: Status,
              StandardOutput: StandardOutputContent,
              StandardError: StandardErrorContent
            }'