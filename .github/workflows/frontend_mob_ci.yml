name: ClearPath Frontend (Mobile) CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/mobile/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/mobile/**'

jobs:
  run-mobile-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Mobile Dependencies
      run: npm install
      working-directory: ./frontend/mobile


    - name: Run Mobile Tests (Skeleton Pipeline)
      run: npm run test
      working-directory: ./frontend/mobile
