name: ClearPath Frontend (Mobile) CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/mobile/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/mobile/**'

jobs:
  run-mobile-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' 
        cache-dependency-path: './frontend/mobile/package-lock.json'

    - name: Install Mobile Dependencies
      run: npm ci 
      working-directory: ./frontend/mobile

    - name: Run Mobile Linting Check
      run: npm run lint
      working-directory: ./frontend/mobile
      
    - name: Run Mobile Tests (Pipeline Validation)
      run: npm run test
      working-directory: ./frontend/mobile
