name: ClearPath Frontend (Web) CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/web/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/web/**'

jobs:
  run-web-tests:
    runs-on: ubuntu-latest 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4


    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: frontend/web/package-lock.json

    - name: Install Web Dependencies
      run: npm ci
      working-directory: ./frontend/web

    - name: Run Web Linting Check
      run: npm run lint
      working-directory: ./frontend/web

    - name: Run Web Tests (Skeleton Pipeline)
      run: npm run test
      working-directory: ./frontend/web

    - name: Build Web Production Bundle
      run: npm run build
      working-directory: ./frontend/web
